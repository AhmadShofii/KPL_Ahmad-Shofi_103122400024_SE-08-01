<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pengkonversi Gaya Teks</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Pengkonversi Gaya Teks</h1>
<p>Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan paragraf.</p>

<label>Masukkan teks:</label>

<textarea id="teks" placeholder="Kata-kata..." oninput="hitungHuruf()"></textarea>

<p>
Huruf: <span id="total">0</span>, 
huruf besar: <span id="besar">0</span> 
huruf kecil: <span id="kecil">0</span>
</p>

<div class="btn">
<button onclick="besar()">Besarkan</button>
<button onclick="kecil()">Kecilkan</button>
<button onclick="paragraf()">Paragrafkan</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
